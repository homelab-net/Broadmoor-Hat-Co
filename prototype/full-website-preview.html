<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broadmoor Hat Co — Full Website Preview</title>
    <style>
      :root {
        --bg: #f5f1ea;
        --ink: #2e241f;
        --muted: #6a564a;
        --border: #dacbbc;
        --brand: #7c4f3c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      header {
        position: sticky;
        top: 0;
        background: #fff;
        border-bottom: 1px solid var(--border);
        z-index: 10;
      }
      .wrap {
        width: min(1200px, 94vw);
        margin: 0 auto;
      }
      .header-row {
        display: flex;
        gap: 0.75rem;
        justify-content: space-between;
        align-items: center;
        padding: 0.8rem 0;
      }
      .header-row h1 {
        margin: 0;
        font-size: 1.05rem;
      }
      nav {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      nav button {
        border: 1px solid #cebba8;
        background: #fff;
        color: var(--ink);
        border-radius: 8px;
        padding: 0.45rem 0.7rem;
        font: inherit;
        cursor: pointer;
      }
      nav button.active {
        border-color: var(--brand);
        background: #f3e6d8;
      }
      main { padding: 1rem 0 1.5rem; }
      .intro {
        margin-bottom: 0.8rem;
        color: var(--muted);
      }
      .panel {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        overflow: hidden;
      }
      iframe {
        width: 100%;
        min-height: 82vh;
        border: 0;
        display: block;
      }
      .link-row {
        margin-top: 0.8rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }
      .link-row a {
        color: var(--brand);
        font-weight: 600;
      }
      @media (max-width: 760px) {
        iframe { min-height: 76vh; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap header-row">
        <h1>Broadmoor Hat Co — Full Website Preview</h1>
        <nav aria-label="Preview selectors">
          <button data-target="./website-overhaul/index.html" class="active">Website Overhaul</button>
          <button data-target="./hat-finder-2.0/index.html">Hat Finder 2.0</button>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <p id="introText" class="intro">
        Showing the full website overhaul prototype (homepage / conversion flow / funnels).
      </p>

      <section class="panel" aria-label="Website preview panel">
        <iframe id="previewFrame" src="./website-overhaul/index.html" title="Broadmoor website preview"></iframe>
      </section>

      <div class="link-row">
        <a href="./website-overhaul/index.html">Open website overhaul directly</a>
        <a href="./hat-finder-2.0/index.html">Open Hat Finder 2.0 directly</a>
      </div>
    </main>

    <script>
      const buttons = document.querySelectorAll('nav button');
      const frame = document.getElementById('previewFrame');
      const intro = document.getElementById('introText');

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          buttons.forEach((item) => item.classList.remove('active'));
          button.classList.add('active');

          const target = button.dataset.target;
          frame.src = target;
          intro.textContent = button.textContent.includes('Hat Finder')
            ? 'Showing Hat Finder 2.0 (quiz + designer + recommendations).'
            : 'Showing the full website overhaul prototype (homepage / conversion flow / funnels).';
        });
      });
    </script>
  </body>
</html>
