<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broadmoor Hat Co — Hat Finder 2.0 Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Hat Finder 2.0 Prototype</h1>
      <p>Quiz + modular piece-part designer (crown / brim / band)</p>
    </header>

    <main class="layout">
      <section class="panel" id="quizPanel">
        <h2>Style Quiz</h2>
        <div class="mode-toggle" role="tablist" aria-label="Builder mode">
          <button id="simpleModeBtn" type="button" class="active">Simple Mode</button>
          <button id="advancedModeBtn" type="button">Advanced Mode</button>
        </div>
        <div id="quizStep" class="quiz-step"></div>
        <div class="quiz-actions">
          <button id="prevBtn" type="button">Back</button>
          <button id="nextBtn" type="button">Next</button>
        </div>
      </section>

      <section class="panel" id="designerPanel">
        <h2>Live Designer</h2>
        <div class="preview-wrap">
          <svg class="hat-preview" viewBox="0 0 420 280" role="img" aria-label="Hat preview">
            <g id="layerBrim"></g>
            <g id="layerCrown"></g>
            <g id="layerBand"></g>
          </svg>
        </div>

        <form id="builderForm" class="controls">
          <label>
            Crown
            <select id="crownSelect"></select>
          </label>

          <label>
            Brim
            <select id="brimSelect"></select>
          </label>

          <label>
            Band
            <select id="bandSelect"></select>
          </label>

          <label>
            Color Palette
            <select id="colorSelect"></select>
          </label>

          <label>
            Fit Profile
            <select id="fitSelect"></select>
          </label>
        </form>

        <div id="compatibilityMessage" class="notice" aria-live="polite"></div>

        <div class="result">
          <p id="buildCode"></p>
          <p id="buildSummary"></p>
          <p id="buildPrice"></p>
          <p id="buildTurnaround"></p>
          <button id="saveBuildBtn" type="button">Save My Build</button>
          <p id="savedBuildMessage"></p>
        </div>

        <section class="recommendations">
          <h3>Top 3 Looks from Quiz</h3>
          <div id="recommendationsList" class="recommendations-list"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
